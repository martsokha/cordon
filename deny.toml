# Configuration for cargo-deny
# See: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-unknown-linux-musl" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
unmaintained = "workspace"
yanked = "deny"
ignore = []

[licenses]
confidence-threshold = 0.8
private = { ignore = false, registries = [] }
unused-allowed-license = "warn"

# Only licenses actually encountered in the current dep tree.
# cargo-deny warns about unused entries here; adding a new
# allowance without a matching crate would re-introduce the
# warning. When a dep upgrade brings in a new licence, expand
# this list then — do not pre-seed speculative entries.
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unlicense",
    "BSL-1.0",
    "CC0-1.0",
    "Zlib",
]

exceptions = [
    # `epaint_default_fonts` ships default UI fonts (Ubuntu,
    # Hack, Noto, Emoji) whose font files carry OFL-1.1 and
    # Ubuntu-font-1.0 in addition to the crate's own MIT /
    # Apache-2.0. Both are OSI-approved free-software font
    # licenses (the OFL is explicitly FSF Free/Libre per the
    # cargo-deny report). Scoping the allowance to this one
    # crate keeps the global licence list clean — no new
    # dependency can sneak OFL-1.1 in without tripping the
    # check again.
    { allow = ["OFL-1.1", "Ubuntu-font-1.0"], crate = "epaint_default_fonts" },
]

[bans]
# Version-splits are the norm in the Bevy + winit + egui +
# rand ecosystems we depend on: dozens of transitive crates
# land at different versions across the tree because upstream
# crates don't all rev together. We can't fix those from our
# side, and the noise drowns out real signals. `allow` makes
# the check unconditional; `wildcards` and the explicit deny
# list below still catch the things we *do* care about.
multiple-versions = "allow"
wildcards = "deny"
highlight = "all"

allow = []

deny = [
    { name = "openssl-sys", version = "*" },
    { name = "openssl", version = "*" },
]

skip = []
skip-tree = []
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
